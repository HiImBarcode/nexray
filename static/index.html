<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXRAY – Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#0f6e73"/>
        <path d="M7 9h14M7 14h9M7 19h12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <h1>NEXRAY</h1>
    </div>

    <nav class="sidebar-nav">

      <div class="nav-section">
        <span class="nav-section-label">Overview</span>
        <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Dashboard
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">OMS</span>
        <button class="nav-item" data-page="outbound" onclick="navigate('outbound')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          Outbound Queue
          <span class="nav-badge" id="nav-pending-badge" style="display:none"></span>
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Execution</span>
        <button class="nav-item" data-page="cuts" onclick="navigate('cuts')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6-6 6 6M6 15l6 6 6-6"/></svg>
          Cuts
        </button>
        <button class="nav-item" data-page="tags" onclick="navigate('tags')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><circle cx="7" cy="7" r="1.5" fill="currentColor"/></svg>
          Tags & Labels
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">WMS</span>
        <button class="nav-item" data-page="inventory" onclick="navigate('inventory')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Lots & Rolls
        </button>
        <button class="nav-item" data-page="warehouses" onclick="navigate('warehouses')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Warehouses
        </button>
        <button class="nav-item" data-page="movements" onclick="navigate('movements')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          Movement Ledger
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">Controls</span>
        <button class="nav-item" data-page="adjustments" onclick="navigate('adjustments')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Approvals
          <span class="nav-badge" id="nav-approval-badge" style="display:none"></span>
        </button>
        <button class="nav-item" data-page="findings" onclick="navigate('findings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Findings
          <span class="nav-badge" id="nav-findings-badge" style="display:none"></span>
        </button>
      </div>

      <div class="nav-section">
        <span class="nav-section-label">System</span>
        <button class="nav-item" data-page="integrations" onclick="navigate('integrations')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          Integrations
        </button>
        <button class="nav-item" data-page="users" onclick="navigate('users')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Users & RBAC
        </button>
        <button class="nav-item" data-page="audit" onclick="navigate('audit')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Audit Log
        </button>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="user-avatar">OP</div>
      <div class="user-info">
        <div class="user-name">Operator</div>
        <div class="user-role">warehouse_manager</div>
      </div>
    </div>
  </aside>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <button class="mobile-toggle btn btn-ghost" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <h2 id="page-title">Dashboard</h2>
        <div class="header-breadcrumb" id="page-breadcrumb">NEXRAY › Operations</div>
      </div>
    </div>
    <div class="header-right">
      <select class="entity-select" onchange="switchEntity(this.value)">
        <option value="ent-01">Entity 01</option>
        <option value="ent-02">Entity 02</option>
      </select>
      <button class="theme-toggle btn btn-ghost" data-theme-toggle aria-label="Toggle theme"></button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <section class="page-section active" id="page-dashboard"></section>
    <section class="page-section" id="page-outbound"></section>
    <section class="page-section" id="page-cuts"></section>
    <section class="page-section" id="page-tags"></section>
    <section class="page-section" id="page-inventory"></section>
    <section class="page-section" id="page-warehouses"></section>
    <section class="page-section" id="page-movements"></section>
    <section class="page-section" id="page-adjustments"></section>
    <section class="page-section" id="page-findings"></section>
    <section class="page-section" id="page-integrations"></section>
    <section class="page-section" id="page-users"></section>
    <section class="page-section" id="page-audit"></section>

  </main>
</div>

<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

<script src="./app.js"></script>
</body>
</html>
