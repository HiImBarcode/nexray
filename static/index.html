<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXRAY — Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="app">

<!-- Mobile overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-label="NEXRAY Logo">
      <rect x="2" y="2" width="28" height="28" rx="6" stroke="currentColor" stroke-width="2.5"/>
      <path d="M9 23V9l7 14L23 9v14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>NEXRAY</h1>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Operations</div>
      <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-page="outbound" onclick="navigate('outbound')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
        Outbound Queue
        <span class="nav-badge" id="nav-pending-badge"></span>
      </button>
      <button class="nav-item" data-page="cuts" onclick="navigate('cuts')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><line x1="20" y1="4" x2="8.12" y2="15.88"/><line x1="14.47" y1="14.48" x2="20" y2="20"/><line x1="8.12" y1="8.12" x2="12" y2="12"/></svg>
        Cut Transactions
      </button>
      <button class="nav-item" data-page="tags" onclick="navigate('tags')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        Tags &amp; Labels
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Inventory</div>
      <button class="nav-item" data-page="inventory" onclick="navigate('inventory')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Lots &amp; Rolls
      </button>
      <button class="nav-item" data-page="warehouses" onclick="navigate('warehouses')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Warehouses
      </button>
      <button class="nav-item" data-page="movements" onclick="navigate('movements')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Movement Ledger
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">Controls</div>
      <button class="nav-item" data-page="adjustments" onclick="navigate('adjustments')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Approvals
        <span class="nav-badge" id="nav-approval-badge"></span>
      </button>
      <button class="nav-item" data-page="findings" onclick="navigate('findings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Findings
        <span class="nav-badge" id="nav-findings-badge"></span>
      </button>
      <button class="nav-item" data-page="integrations" onclick="navigate('integrations')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Integrations
      </button>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">System</div>
      <button class="nav-item" data-page="users" onclick="navigate('users')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Users &amp; RBAC
      </button>
      <button class="nav-item" data-page="audit" onclick="navigate('audit')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Audit Log
      </button>
    </div>
  </nav>

  <div class="sidebar-footer">
    <div class="user-avatar">SA</div>
    <div class="user-info">
      <div class="user-name">System Admin</div>
      <div class="user-role">system_admin</div>
    </div>
  </div>
</aside>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-left">
    <button class="mobile-toggle" onclick="toggleSidebar()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div>
      <h2 id="page-title">Dashboard</h2>
      <div class="header-breadcrumb" id="page-breadcrumb">NEXRAY &rsaquo; Operations</div>
    </div>
  </div>
  <div class="header-right">
    <select class="entity-select" id="entitySelect" onchange="switchEntity(this.value)">
      <option value="ent-01">Premium Projects</option>
      <option value="ent-02">B2B Wholesale</option>
      <option value="ent-03">DTC E-Commerce</option>
    </select>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<main class="main" id="mainContent">

  <!-- DASHBOARD -->
  <section class="page-section active" id="page-dashboard"></section>

  <!-- OUTBOUND QUEUE -->
  <section class="page-section" id="page-outbound"></section>

  <!-- CUT TRANSACTIONS -->
  <section class="page-section" id="page-cuts"></section>

  <!-- TAGS & LABELS -->
  <section class="page-section" id="page-tags"></section>

  <!-- INVENTORY -->
  <section class="page-section" id="page-inventory"></section>

  <!-- WAREHOUSES -->
  <section class="page-section" id="page-warehouses"></section>

  <!-- MOVEMENT LEDGER -->
  <section class="page-section" id="page-movements"></section>

  <!-- ADJUSTMENTS -->
  <section class="page-section" id="page-adjustments"></section>

  <!-- FINDINGS -->
  <section class="page-section" id="page-findings"></section>

  <!-- INTEGRATIONS -->
  <section class="page-section" id="page-integrations"></section>

  <!-- USERS -->
  <section class="page-section" id="page-users"></section>

  <!-- AUDIT LOG -->
  <section class="page-section" id="page-audit"></section>

</main>
</div>

<script src="./app.js"></script>
</body>
</html>
