<body>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none" aria-label="NEXRAY Logo">
        <path d="M16 2L28.66 9.5V24.5L16 32L3.34 24.5V9.5L16 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
        <path d="M11 22V10L16 16L21 10V22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>NEXRAY</h1>
    </div>
    <p class="login-tagline">Operations Platform</p>
    <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="loginUsername">Username</label>
        <input type="text" id="loginUsername" class="form-input" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn btn-primary login-btn" id="loginBtn">Sign In</button>
    </form>
    <div class="login-hint">Demo credentials: <span class="mono">admin</span> / <span class="mono">admin</span></div>
  </div>
</div>

<div class="app" id="appContainer" style="display:none">

<!-- Mobile overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>
